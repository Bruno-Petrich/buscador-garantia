<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Garantia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- SheetJS CDN -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header fixo com barra de busca -->
        <header class="search-header glass-effect">
            <div class="header-content">
                <div class="title-row">
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <img src="logo_nuctech.jpeg" alt="Nuctech Logo" class="brand-logo">
                        <h1>Buscador de Garantia</h1>
                    </div>
                    <button id="themeToggleBtn" class="theme-toggle" aria-label="Alternar tema">
                        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
                <p class="subtitle">Encontre informações pelo Nº de Série</p>
                
                <div class="search-box">
                    <div class="input-wrapper">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Digite o Nº de Série..." autocomplete="off">
                        <button id="clearBtn" class="clear-btn hidden" aria-label="Limpar busca">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Indicador de Status/Carregamento -->
            <div id="statusContainer" class="status-container">
                <div class="loader hidden" id="loader"></div>
                <p id="statusText" class="status-text">Carregando base de dados...</p>
            </div>
            
            <!-- Arquivo de fallback (CORS no file://) -->
            <div id="fallbackContainer" class="hidden" style="text-align: center; margin-top: 1rem; margin-bottom: 0.5rem;">
                <label for="fileUpload" style="cursor:pointer; background: rgba(88, 166, 255, 0.15); border: 1px solid var(--accent-color); color: var(--text-primary); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: inline-block;">
                    Abrir arquivo Excel manualmente
                </label>
                <input type="file" id="fileUpload" accept=".xlsx, .xls" class="hidden">
            </div>
        </header>

        <!-- Área de resultados -->
        <main class="results-area" id="resultsArea">
            <!-- Estado Inicial -->
            <div class="empty-state" id="emptyState">
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                </div>
                <h2>Pronto para buscar</h2>
                <p>Digite um número de série acima para ver os detalhes da garantia e instalação.</p>
            </div>

            <!-- Lista de Resultados (Injetada via JS) -->
            <div class="results-list" id="resultsList"></div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
